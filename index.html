<!DOCTYPE html>
<html>
<head>
<title>Hakimi Tire Inventory</title>
<style>
body{
font-family:Arial;
background:#111;
color:white;
max-width:1000px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
font-size:40px;
}

.card{
background:#222;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input,select,button{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:#222;
border-radius:15px;
overflow:hidden;
}

th{
background:#333;
padding:12px;
}

td{
padding:12px;
border-top:1px solid #444;
}

.delete{
background:red;
color:white;
}
</style>
</head>
<body>

<h1>🛞 Hakimi Tire Inventory</h1>

<div class="card">
<h2>Search Tire</h2>
<input id="searchBox" placeholder="Tire Number">
<button onclick="searchTire()">Search</button>
<p id="result"></p>
</div>

<div class="card">
<h2>Add Tire</h2>

<input id="number" placeholder="Tire Number">
<input id="brand" placeholder="Brand">
<input id="size" placeholder="Size">
<input id="qty" placeholder="Quantity">

<select id="type">
<option>Winter</option>
<option>Summer</option>
<option>All Weather</option>
<option>All Season</option>
</select>

<button onclick="addTire()">Add Tire</button>
</div>

<table>
<thead>
<tr>
<th>Number</th>
<th>Brand</th>
<th>Size</th>
<th>Qty</th>
<th>Type</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="inventory"></tbody>

</table>

<script>

let tires =
JSON.parse(localStorage.getItem("tires")) || [];

function saveData(){
localStorage.setItem(
"tires",
JSON.stringify(tires)
);
}

function renderTable(){

let html="";

tires.forEach((tire,index)=>{

html+=`
<tr>
<td>${tire.number}</td>
<td>${tire.brand}</td>
<td>${tire.size}</td>
<td>${tire.qty}</td>
<td>${tire.type}</td>
<td>
<button class="delete"
onclick="deleteTire(${index})">
X
</button>
</td>
</tr>
`;

});

document.getElementById(
"inventory"
).innerHTML=html;

}

function addTire(){

tires.push({
number:number.value,
brand:brand.value,
size:size.value,
qty:qty.value,
type:type.value
});

saveData();
renderTable();

}

function deleteTire(index){

tires.splice(index,1);

saveData();
renderTable();

}

function searchTire(){

let tire=
tires.find(
t=>t.number===searchBox.value
);

result.innerHTML=
tire
?
`✅ ${tire.brand} | ${tire.size} | Qty ${tire.qty} | ${tire.type}`
:
"❌ Tire Not Found";

}

renderTable();

</script>

</body>
</html>
