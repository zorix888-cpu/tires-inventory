<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBI Inventory System</title>
<style>
/* General Styles */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  font-family: "Arial", sans-serif;
  background-color: #121212;
  color: #ffffff;
}
.hidden {
  display: none !important;
}
/* Forms & Modals */
.form-container {
  padding: 20px;
  background-color: #1e1e1e;
  border-radius: 8px;
  box-shadow: 0 4px 15px rgb(0 0 0 / 50%);
  width: 100%;
  max-width: 400px;
}
form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
input, select, button {
  padding: 10px;
  font-size: 1rem;
  border: none;
  border-radius: 4px;
}
button {
  cursor: pointer;
  background-color: #007bff;
  color: white;
  transition: background-color 0.3s;
}
button:hover {
  background-color: #0056b3;
}
/* Main Layout */
#app {
  display: flex;
  min-height: 100vh;
}
aside {
  width: 240px;
  background-color: #181818;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
aside h2 {
  color: #6bcacb;
  text-align: center;
  margin-bottom: 2rem;
}
nav button {
  padding: 10px 16px;
  color: white;
  text-align: left;
  background: #121212;
  border: none;
  cursor: pointer;
}
nav button:hover {
  background: #333333;
}
main {
  padding: 20px;
  flex: 1;
}
main h1 {
  margin-bottom: 2rem;
}
/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
.modal {
  padding: 20px;
  max-width: 500px;
  width: 100%;
  background: #1e1e1e;
  border-radius: 4px;
}
/* Tables and Dashboard Metrics */
section h3 {
  margin-bottom: 1rem;
}
table {
  width: 100%;
  border-collapse: collapse;
}
table th, table td {
  padding: 12px;
  border-bottom: 1px solid #333;
}
/* Dashboard Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
  margin-bottom: 2rem;
}
.stat-card {
  padding: 20px;
  background-color: #232323;
  border-radius: 8px;
  text-align: center;
  box-shadow: 0 4px 8px rgb(0 0 0 / 30%);
}
</style>
</head>
<body>
<!-- LOGIN PAGE -->
<div id="login-page" class="hidden">
  <div class="form-container">
    <h1>Login</h1>
    <div id="login-error" style="color: #f00; display:none;">Invalid credentials!</div>
    <form onsubmit="return handleLogin(event)">
      <input type="text" id="login-username" placeholder="Username" required />
      <input type="password" id="login-password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <div style="text-align:center; margin-top: 1rem;">
      <button onclick="showSignup()">Don't have an account? Sign Up</button>
    </div>
  </div>
</div>

<!-- SIGN-UP PAGE -->
<div id="signup-page" class="hidden">
  <div class="form-container">
    <h1>Create Account</h1>
    <div id="signup-error" style="color: #f00; display:none;">Error during signup!</div>
    <form onsubmit="return handleSignup(event)">
      <input type="text" id="signup-username" placeholder="Choose a username" required />
      <input type="password" id="signup-password" placeholder="Choose a password" required />
      <select id="signup-role">
        <option value="Owner">Owner</option>
        <option value="Manager">Manager</option>
        <option value="Worker">Worker</option>
      </select>
      <button type="submit">Sign Up</button>
    </form>
    <div style="text-align:center; margin-top: 1rem;">
      <button onclick="goToLogin()">Already have an account? Login</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
  <aside>
    <h2>OBI System</h2>
    <nav>
      <button onclick="navigate('dashboard')">Dashboard</button>
      <button onclick="navigate('inventory')">Inventory</button>
      <button onclick="logout()">Logout</button>
    </nav>
  </aside>
  <main>
    <section id="dashboard" class="hidden">
      <h1>Dashboard</h1>
      <div class="stats">
        <div class="stat-card">
          <h3>Total Stock</h3>
          <p id="total-stock">0</p>
        </div>
        <div class="stat-card">
          <h3>Total Revenue</h3>
          <p>$0.00</p>
        </div>
        <div class="stat-card">
          <h3>Low Stock Alerts</h3>
          <p id="low-stock-items">0</p>
        </div>
      </div>
    </section>
    
    <section id="inventory" class="hidden">
      <h1>Inventory</h1>
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Quantity</th>
            <th>Price</th>
          </tr>
        </thead>
        <tbody id="inventory-list"></tbody>
      </table>
    </section>
  </main>
</div>

<script>
// DATABASE SIMULATION
const DB = {
  users: [{ username: "owner", password: "obi123", role: "Owner" }],
  session: null,
  inventory: [{ item: "Tire A", quantity: 10, price: 50 }],
};

// AUTHENTICATION
function handleLogin(event) {
  event.preventDefault();
  const username = document.getElementById("login-username").value;
  const password = document.getElementById("login-password").value;

  const user = DB.users.find(
    (u) => u.username === username && u.password === password
  );

  if (!user) {
    document.getElementById("login-error").style.display = "block";
  } else {
    DB.session = user;
    launchApp();
  }
}

function handleSignup(event) {
  event.preventDefault();
  const username = document.getElementById("signup-username").value;
  const password = document.getElementById("signup-password").value;
  const role = document.getElementById("signup-role").value;

  if (DB.users.find((u) => u.username === username)) {
    document.getElementById("signup-error").style.display = "block";
    return;
  }

  DB.users.push({ username, password, role });
  goToLogin();
}

// APP NAVIGATION
function launchApp() {
  document.getElementById("login-page").classList.add("hidden");
  document.getElementById("signup-page").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  navigate('dashboard');
}

function navigate(page) {
  document.querySelectorAll("section").forEach(section => section.classList.add("hidden"));
  document.getElementById(page).classList.remove("hidden");
}

function showSignup() {
  document.getElementById("login-page").classList.add("hidden");
  document.getElementById("signup-page").classList.remove("hidden");
}

function goToLogin() {
  document.getElementById("signup-page").classList.add("hidden");
  document.getElementById("login-page").classList.remove("hidden");
}

function logout() {
  DB.session = null;
  document.getElementById("app").classList.add("hidden");
  document.getElementById("login-page").classList.remove("hidden");
}

// INVENTORY MANAGEMENT
function populateInventory() {
  const table = document.getElementById("inventory-list");
  table.innerHTML = DB.inventory
    .map((item) => `<tr><td>${item.item}</td><td>${item.quantity}</td><td>$${item.price}</td></tr>`)
    .join("");
}

populateInventory();
</script>
</body>
</html>
