<!DOCTYPE html>
<html>
<head>
<title>OBI Tire Inventory</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    font-size:48px;
    color:#38bdf8;
    text-shadow:0 0 20px #38bdf8;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

input,select{
    padding:12px;
    border:none;
    border-radius:10px;
    margin:5px;
    background:#334155;
    color:white;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0ea5e9;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#38bdf8;
    color:black;
    padding:12px;
}

td{
    background:#1e293b;
    padding:12px;
    text-align:center;
}

tr:hover td{
    background:#334155;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 OBI Tire Inventory 🔥</h1>

<div class="card">
<h2>Add Tire</h2>

<input id="number" placeholder="Tire Number">
<input id="brand" placeholder="Brand">
<input id="size" placeholder="Size">

<select id="type">
<option>All Weather</option>
<option>Winter</option>
<option>Summer</option>
</select>

<input id="qty" type="number" placeholder="Quantity">

<button onclick="addTire()">Add Tire</button>
</div>

<div class="card">
<h2>Inventory</h2>

<table>
<thead>
<tr>
<th>Tire Number</th>
<th>Brand</th>
<th>Size</th>
<th>Type</th>
<th>Quantity</th>
</tr>
</thead>

<tbody id="inventory">
</tbody>

</table>
</div>

</div>

<script>
function addTire(){

let number=document.getElementById("number").value;
let brand=document.getElementById("brand").value;
let size=document.getElementById("size").value;
let type=document.getElementById("type").value;
let qty=document.getElementById("qty").value;

let row=`
<tr>
<td>${number}</td>
<td>${brand}</td>
<td>${size}</td>
<td>${type}</td>
<td>${qty}</td>
</tr>
`;

document.getElementById("inventory").innerHTML += row;
}
</script>

</body>
</html>
