<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBI Inventory System</title>
<style>
/* ---- Begin CSS ---- */

/* General Styles */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  background: #000;
  color: white;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
}
input, button, select, textarea {
  font-family: 'Courier New', monospace;
}
.hidden {
  display: none !important;
}

/* Login Page */
#login-page {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.login-box {
  padding: 20px;
  background-color: #0a0a0a;
  border: 1px solid #333;
  max-width: 400px;
  width: 100%;
}
.error-box {
  color: #ef4444;
  background: rgba(239, 68, 68, 0.12);
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid #ef4444;
}

/* Sidebar and Navigation */
nav {
  background: #080808;
  border-right: 1px solid #1a1a1a;
  padding: 16px;
  height: 100vh;
  width: 240px;
  position: fixed;
  top: 0;
  left: 0;
}

/* Dashboard and Inventory */
#app {
  margin-left: 240px;
  padding: 20px;
}
.page-title {
  font-weight: bold;
  letter-spacing: -1px;
  font-size: 20px;
}
.page-actions {
  margin-bottom: 20px;
}
.btn {
  padding: 10px 16px;
  margin-right: 5px;
  font-weight: bold;
  border: none;
  cursor: pointer;
}
.btn-primary {
  background: #ef4444;
  color: #fff;
}

/* Signup Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
.modal {
  background: #0a0a0a;
  border: 1px solid #333;
  padding: 20px;
  max-width: 500px;
  width: 100%;
}
.modal-header,
.modal-body {
  margin-bottom: 16px;
}
.modal-body input {
  width: 100%;
  padding: 10px;
  background: #000;
  border: 1px solid #333;
  color: white;
}

/* ---- End CSS ---- */
</style>
</head>
<body>
<div id="login-page">
  <div class="login-box">
    <h1>OBI Inventory</h1>
    <p>Login to continue.</p>
    <div id="login-error" class="error-box hidden"></div>
    <div>
      <label>Username:</label>
      <input id="login-username" type="text">
    </div>
    <div>
      <label>Password:</label>
      <input id="login-password" type="password">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Login</button>
  </div>
</div>

<div id="app" class="hidden">
  <nav>
    <h2>OBI System</h2>
    <button class="btn btn-primary" onclick="navigate('dashboard')">Dashboard</button>
    <button class="btn btn-primary" onclick="navigate('inventory')">Inventory</button>
    <button id="signup-btn" class="btn btn-primary hidden" onclick="openSignupModal()">Add Admin</button>
    <button class="btn" onclick="logout()">Logout</button>
  </nav>
  <main>
    <section id="page-dashboard" class="hidden">
      <div class="page-title">Dashboard Overview</div>
    </section>
    <section id="page-inventory" class="hidden">
      <div class="page-title">Inventory Management</div>
    </section>
  </main>
</div>

<div id="signup-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3>Create New Admin</h3>
      <button onclick="closeSignupModal()">Close</button>
    </div>
    <div class="modal-body">
      <label>Username</label>
      <input type="text" id="signup-username">
      <label>Password</label>
      <input type="password" id="signup-password">
      <label>Role</label>
      <select id="signup-role">
        <option value="Manager">Manager</option>
        <option value="Worker">Worker</option>
      </select>
      <button class="btn btn-primary" onclick="registerAdmin()">Create Admin</button>
    </div>
  </div>
</div>

<script>
/* Begin JavaScript */
const DB = {
  users: [
    { username: 'owner', password: 'obi123', role: 'Owner' }
  ],
};

/* Login Function */
function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value.trim();
  const errorBox = document.getElementById('login-error');

  const user = DB.users.find(user => user.username === username && user.password === password);

  if (!user) {
    errorBox.textContent = 'Invalid Username or Password.';
    errorBox.classList.remove('hidden');
    return;
  }

  sessionStorage.setItem('currentUser', JSON.stringify(user));
  bootApp(user);
}

/* Boot the Application */
function bootApp(user) {
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  if (user.role === 'Owner') {
    document.getElementById('signup-btn').classList.remove('hidden');
  }
}

/* Create a New Admin */
function registerAdmin() {
  const username = document.getElementById('signup-username').value.trim();
  const password = document.getElementById('signup-password').value.trim();
  const role = document.getElementById('signup-role').value;

  if (!username || !password) {
    alert('All fields are required!');
    return;
  }

  const userAlreadyExists = DB.users.some(user => user.username === username);

  if (userAlreadyExists) {
    alert('Username already exists!');
    return;
  }

  DB.users.push({ username, password, role });
  alert('Admin successfully created!');
  closeSignupModal();
}

/* Open Signup Modal */
function openSignupModal() {
  document.getElementById('signup-modal').classList.remove('hidden');
}

/* Close Signup Modal */
function closeSignupModal() {
  document.getElementById('signup-modal').classList.add('hidden');
}

/* Navigation Functionality */
function navigate(page) {
  document.querySelectorAll('section').forEach(section => {
    section.classList.add('hidden');
  });
  document.getElementById(`page-${page}`).classList.remove('hidden');
}

/* Logout Function */
function logout() {
  sessionStorage.removeItem('currentUser');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-page').classList.remove('hidden');
}
/* End JavaScript */
</script>
</body>
</html>
