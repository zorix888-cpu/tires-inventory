<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBI INVENTORY</title>

<style>
body{
background:#000;
color:#fff;
font-family:Segoe UI,sans-serif;
padding:20px;
}

h1{
text-align:center;
font-size:50px;
letter-spacing:8px;
font-weight:300;
}

.subtitle{
text-align:center;
color:#aaa;
margin-bottom:30px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#111;
border:1px solid #333;
border-radius:15px;
padding:20px;
text-align:center;
}

.section{
background:#111;
border:1px solid #333;
border-radius:15px;
padding:20px;
margin-bottom:20px;
}

input,select{
padding:10px;
margin:5px;
background:#000;
color:white;
border:1px solid #333;
border-radius:8px;
}

button{
padding:10px 15px;
background:white;
color:black;
border:none;
border-radius:8px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:white;
color:black;
padding:12px;
}

td{
background:#111;
padding:12px;
text-align:center;
}
</style>
</head>

<body>

<h1>OBI INVENTORY</h1>
<p class="subtitle">Luxury Inventory Management System</p>

<div class="dashboard">

<div class="card">
<h2 id="totalCount">0</h2>
<p>Total Tires</p>
</div>

<div class="card">
<h2 id="revenue">$0</h2>
<p>Total Revenue</p>
</div>

<div class="card">
<h2 id="totalSold">0</h2>
<p>Total Sold</p>
</div>

</div>

<div class="section">

<input id="number" placeholder="Tire Number">
<input id="brand" placeholder="Brand">
<input id="size" placeholder="Size">
<input id="qty" type="number" placeholder="Quantity">

<button onclick="addTire()">Add Tire</button>

</div>

<div class="section">

<input id="sellNumber" placeholder="Tire Number">
<input id="sellQty" type="number" placeholder="Qty Sold">
<input id="sellPrice" type="number" placeholder="Sale Amount">

<button onclick="sellTire()">Record Sale</button>

</div>

<table>
<thead>
<tr>
<th>Number</th>
<th>Brand</th>
<th>Size</th>
<th>Qty</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="inventory"></tbody>
</table>

<h2 style="margin-top:30px;">Sales History</h2>

<table>
<thead>
<tr>
<th>Date</th>
<th>Tire</th>
<th>Qty</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="salesTable"></tbody>
</table>

<script>
let tires = JSON.parse(localStorage.getItem("obiTires")) || [];
let sales = JSON.parse(localStorage.getItem("obiSales")) || [];

function saveData(){
localStorage.setItem("obiTires", JSON.stringify(tires));
localStorage.setItem("obiSales", JSON.stringify(sales));
}

function updateDashboard(){

let total = 0;
let revenueTotal = 0;
let soldTotal = 0;

tires.forEach(tire=>{
total += Number(tire.qty) || 0;
});

sales.forEach(sale=>{
revenueTotal += Number(sale.amount) || 0;
soldTotal += Number(sale.qty) || 0;
});

document.getElementById("totalCount").innerText = total;
document.getElementById("revenue").innerText =
"$" + revenueTotal.toLocaleString();
document.getElementById("totalSold").innerText = soldTotal;

}

function renderTable(){

let html = "";

tires.forEach((tire,index)=>{

html += `
<tr>
<td>${tire.number}</td>
<td>${tire.brand}</td>
<td>${tire.size}</td>
<td>${tire.qty}</td>
<td>
<button onclick="deleteTire(${index})">
Delete
</button>
</td>
</tr>
`;

});

document.getElementById("inventory").innerHTML = html;

updateDashboard();

}

function renderSales(){

let html = "";

sales.forEach(sale=>{

html += `
<tr>
<td>${sale.date}</td>
<td>${sale.number}</td>
<td>${sale.qty}</td>
<td>$${sale.amount}</td>
</tr>
`;

});

document.getElementById("salesTable").innerHTML = html;

updateDashboard();

}

function addTire(){

if(number.value==="") return;

tires.push({
number:number.value,
brand:brand.value,
size:size.value,
qty:Number(qty.value)
});

saveData();
renderTable();

number.value="";
brand.value="";
size.value="";
qty.value="";

}

function deleteTire(index){

tires.splice(index,1);

saveData();
renderTable();

}

function sellTire(){

let tire = tires.find(
t => t.number === sellNumber.value
);

if(!tire){
alert("Tire Not Found");
return;
}

let qtySold = Number(sellQty.value);

if(qtySold > tire.qty){
alert("Not Enough Stock");
return;
}

tire.qty -= qtySold;

sales.push({
number:tire.number,
qty:qtySold,
amount:Number(sellPrice.value),
date:new Date().toLocaleString()
});

saveData();

renderTable();
renderSales();

sellNumber.value="";
sellQty.value="";
sellPrice.value="";

}

renderTable();
renderSales();

</script>

</body>
</html>
