<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OBI Tire Inventory</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
font-size:42px;
color:#38bdf8;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:15px;
text-align:center;
}

.section{
background:#1f2937;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input,select,button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
}

input,select{
background:#374151;
color:white;
}

button{
background:#38bdf8;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

table{
width:100%;
border-collapse:collapse;
background:#1f2937;
}

th{
background:#38bdf8;
color:black;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-top:1px solid #374151;
}

.deleteBtn{
background:#ef4444;
color:white;
}
</style>
</head>

<body>

<h1>🔥 OBI TIRE INVENTORY 🔥</h1>

<div class="dashboard">
<div class="card">
<h2 id="total">0</h2>
<p>Total Tires</p>
</div>

<div class="card">
<h2 id="winter">0</h2>
<p>Winter</p>
</div>

<div class="card">
<h2 id="summer">0</h2>
<p>Summer</p>
</div>

<div class="card">
<h2 id="allweather">0</h2>
<p>All Weather</p>
</div>
</div>

<div class="section">
<h2>🔍 Search Tire</h2>

<input id="searchBox" placeholder="Enter Tire Number">
<button onclick="searchTire()">Search</button>

<p id="result"></p>
</div>

<div class="section">
<h2>➕ Add Tire</h2>

<input id="number" placeholder="Tire Number">
<input id="brand" placeholder="Brand">
<input id="size" placeholder="Size">
<input id="qty" placeholder="Quantity">

<select id="type">
<option>Winter</option>
<option>Summer</option>
<option>All Weather</option>
<option>All Season</option>
</select>

<button onclick="addTire()">Add Tire</button>
</div>

<table>
<thead>
<tr>
<th>Number</th>
<th>Brand</th>
<th>Size</th>
<th>Qty</th>
<th>Type</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="inventory"></tbody>
</table>

<script>

let tires = JSON.parse(localStorage.getItem("tires")) || [];

function saveData(){
localStorage.setItem("tires",JSON.stringify(tires));
}

function updateDashboard(){

document.getElementById("total").innerText=tires.length;

document.getElementById("winter").innerText=
tires.filter(t=>t.type==="Winter").length;

document.getElementById("summer").innerText=
tires.filter(t=>t.type==="Summer").length;

document.getElementById("allweather").innerText=
tires.filter(t=>t.type==="All Weather").length;

}

function renderTable(){

let html="";

tires.forEach((tire,index)=>{

html += `
<tr>
<td>${tire.number}</td>
<td>${tire.brand}</td>
<td>${tire.size}</td>
<td>${tire.qty}</td>
<td>${tire.type}</td>
<td>
<button class="deleteBtn"
onclick="deleteTire(${index})">
Delete
</button>
</td>
</tr>
`;

});

document.getElementById("inventory").innerHTML=html;

updateDashboard();

}

function addTire(){

tires.push({
number:number.value,
brand:brand.value,
size:size.value,
qty:qty.value,
type:type.value
});

saveData();
renderTable();

number.value="";
brand.value="";
size.value="";
qty.value="";
}

function deleteTire(index){

tires.splice(index,1);

saveData();
renderTable();

}

function searchTire(){

let tire =
tires.find(
t=>t.number===searchBox.value
);

if(tire){

result.innerHTML=
`✅ ${tire.brand} | ${tire.size} | Qty ${tire.qty} | ${tire.type}`;

}else{

result.innerHTML=
"❌ Tire Not Found";

}

}

renderTable();

</script>

</body>
</html>
