<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OBI Premium Tire Inventory</title>

<style>

body{
background:#0d0d0d;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

h1{
text-align:center;
font-size:45px;
color:#ff2d2d;
margin-bottom:25px;
text-shadow:0 0 15px #ff2d2d;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#181818;
border:1px solid #ff2d2d;
border-radius:12px;
padding:20px;
text-align:center;
}

.card h2{
margin:0;
color:#ff2d2d;
}

.section{
background:#181818;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input,select{
padding:12px;
margin:5px;
border-radius:8px;
border:1px solid #333;
background:#111;
color:white;
}

button{
background:#ff2d2d;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#cc0000;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#ff2d2d;
padding:12px;
}

td{
background:#151515;
padding:12px;
text-align:center;
}

</style>
</head>

<body>

<h1>🔥 OBI Premium Tire Inventory 🔥</h1>

<div class="dashboard">

<div class="card">
<h2 id="totalCount">0</h2>
<p>Total Tires</p>
</div>

<div class="card">
<h2 id="winterCount">0</h2>
<p>Winter</p>
</div>

<div class="card">
<h2 id="summerCount">0</h2>
<p>Summer</p>
</div>

<div class="card">
<h2 id="allSeasonCount">0</h2>
<p>All Season</p>
</div>

<div class="card">
<h2 id="allWeatherCount">0</h2>
<p>All Weather</p>
</div>

</div>

<div class="section">

<input id="number" placeholder="Tire Number">
<input id="brand" placeholder="Brand">
<input id="size" placeholder="Size">
<input id="qty" type="number" placeholder="Quantity">

<select id="type">
<option>Winter</option>
<option>Summer</option>
<option>All Season</option>
<option>All Weather</option>
</select>

<select id="condition">
<option>New</option>
<option>Used</option>
<option>Like New</option>
</select>

<button onclick="addTire()">Add Tire</button>

</div>

<div class="section">

<input id="search" placeholder="Search Tire Number">
<button onclick="searchTire()">Search</button>

<p id="result"></p>

</div>

<table>
<thead>
<tr>
<th>Number</th>
<th>Brand</th>
<th>Size</th>
<th>Qty</th>
<th>Type</th>
<th>Condition</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="inventory">
</tbody>
</table>
<script>

let tires = JSON.parse(localStorage.getItem("obiTires")) || [];

function saveTires(){
localStorage.setItem("obiTires", JSON.stringify(tires));
}

function updateDashboard(){

let winter = 0;
let summer = 0;
let allSeason = 0;
let allWeather = 0;
let total = 0;

tires.forEach(tire => {

let qty = Number(tire.qty) || 0;

total += qty;

if(tire.type === "Winter") winter += qty;
if(tire.type === "Summer") summer += qty;
if(tire.type === "All Season") allSeason += qty;
if(tire.type === "All Weather") allWeather += qty;

});

document.getElementById("totalCount").innerText = total;
document.getElementById("winterCount").innerText = winter;
document.getElementById("summerCount").innerText = summer;
document.getElementById("allSeasonCount").innerText = allSeason;
document.getElementById("allWeatherCount").innerText = allWeather;

}

function renderTable(){

let html = "";

tires.forEach((tire,index)=>{

html += `
<tr>
<td>${tire.number}</td>
<td>${tire.brand}</td>
<td>${tire.size}</td>
<td>${tire.qty}</td>
<td>${tire.type}</td>
<td>${tire.condition}</td>
<td>
<button onclick="deleteTire(${index})">
Delete
</button>
</td>
</tr>
`;

});

document.getElementById("inventory").innerHTML = html;

updateDashboard();

}

function addTire(){

const tire = {
number: document.getElementById("number").value,
brand: document.getElementById("brand").value,
size: document.getElementById("size").value,
qty: document.getElementById("qty").value,
type: document.getElementById("type").value,
condition: document.getElementById("condition").value
};

tires.push(tire);

saveTires();
renderTable();

document.getElementById("number").value = "";
document.getElementById("brand").value = "";
document.getElementById("size").value = "";
document.getElementById("qty").value = "";

}

function deleteTire(index){

tires.splice(index,1);

saveTires();
renderTable();

}

function searchTire(){

const searchValue =
document.getElementById("search").value;

const tire =
tires.find(t => t.number === searchValue);

if(tire){

document.getElementById("result").innerHTML =
`✅ ${tire.brand} | ${tire.size} | Qty ${tire.qty} | ${tire.type} | ${tire.condition}`;

}else{

document.getElementById("result").innerHTML =
"❌ Tire Not Found";

}

}

renderTable();

</script>

</body>
</html>
